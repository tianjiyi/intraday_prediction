services:
  postgres:
    image: timescale/timescaledb-ha:pg16
    environment:
      POSTGRES_DB: agent_memory
      POSTGRES_USER: kronos
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-kronos_dev}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/home/postgres/pgdata/data
      - ./research/market_regime/db_schema.sql:/docker-entrypoint-initdb.d/01_market_data.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kronos -d agent_memory"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  app:
    build: .
    ports:
      - "5000:5000"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    env_file:
      - .env
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: agent_memory
      POSTGRES_USER: kronos
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-kronos_dev}
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - hf_cache:/root/.cache/huggingface
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/api/health')"]
      interval: 30s
      timeout: 10s
      retries: 3


volumes:
  hf_cache:
  pgdata:
